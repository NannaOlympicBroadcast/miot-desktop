<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src http://127.0.0.1:* ws://127.0.0.1:*; style-src 'self' 'unsafe-inline';" />
  <title>快捷控制</title>
  <style>
    :root{--primary:#ff6700;--border:#e3e5e8;--soft:#646a73;--bg:#f4f5f7;}
    *{box-sizing:border-box;}
    html,body{margin:0;height:100%;font-family:"Segoe UI","Microsoft YaHei",system-ui,sans-serif;color:#1f2329;}
    body{display:flex;flex-direction:column;background:#fff;}
    .qhead{-webkit-app-region:drag;display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);}
    .qhead .dot{width:9px;height:9px;border-radius:50%;background:#c9cdd4;}
    .qhead .dot.on{background:#16b777;}
    .qtitle{font-weight:600;font-size:14px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .qhead button{-webkit-app-region:no-drag;border:none;background:transparent;cursor:pointer;color:var(--soft);font-size:15px;padding:2px 6px;border-radius:6px;}
    .qhead button:hover{background:var(--bg);color:var(--primary);}
    .qbody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:16px;}
    .block-label{font-size:12px;color:var(--soft);margin-bottom:8px;}
    .vol-row{display:flex;align-items:center;gap:10px;}
    .vol-row input[type=range]{flex:1;accent-color:var(--primary);}
    .vol-val{min-width:34px;text-align:right;font-variant-numeric:tabular-nums;font-size:13px;}
    .btn-row{display:flex;gap:8px;}
    .btn{flex:1;border:1px solid var(--border);background:#fff;border-radius:8px;padding:8px 0;cursor:pointer;font-size:13px;}
    .btn:hover{border-color:var(--primary);color:var(--primary);}
    .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}
    .btn.primary:hover{opacity:.9;color:#fff;}
    .btn:disabled{opacity:.45;cursor:not-allowed;}
    textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;resize:none;outline:none;font-family:inherit;}
    textarea:focus{border-color:var(--primary);}
    .hint{font-size:11px;color:var(--soft);margin-top:4px;line-height:1.5;}
    .toast{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);background:#1f2329;color:#fff;font-size:12px;padding:7px 14px;border-radius:8px;transition:opacity .25s;max-width:90%;}
    .toast.hidden{opacity:0;}
    .toast.err{background:#f53f3f;}.toast.ok{background:#16b777;}
    .loading{padding:24px;text-align:center;color:var(--soft);font-size:13px;}
  </style>
</head>
<body>
  <div class="qhead">
    <span id="q-dot" class="dot"></span>
    <span id="q-title" class="qtitle">快捷控制</span>
    <button id="q-open" title="打开主界面">⤢</button>
    <button id="q-close" title="收起">✕</button>
  </div>
  <div id="q-body" class="qbody">
    <div class="loading">加载中…</div>
  </div>
  <div id="q-toast" class="toast hidden"></div>
  <script src="quick.js"></script>
</body>
</html>
